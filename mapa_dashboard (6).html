<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מפה — לוח בקרה</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;background:#0D1117;color:#E6EDF3;font-family:Arial,sans-serif;font-size:14px}
.page{display:none}
.page.active{display:block}
/* LOGIN */
#loginPage{min-height:100vh;display:flex;align-items:center;justify-content:center}
.box{background:#161B22;border:1px solid #21262D;border-radius:16px;padding:40px 36px;width:320px;text-align:center}
.logo{width:56px;height:56px;background:#00D4AA;border-radius:14px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:26px;font-weight:700;color:#0D1117}
h1{font-size:20px;margin-bottom:4px}
.sub{font-size:13px;color:#8B949E;margin-bottom:24px}
input[type=password]{width:100%;background:#0D1117;border:1px solid #30363D;border-radius:8px;padding:11px;color:#E6EDF3;font-size:15px;text-align:center;letter-spacing:4px;margin-bottom:12px;outline:none}
input[type=password]:focus{border-color:#00D4AA}
button.enter{width:100%;background:#00D4AA;border:none;border-radius:8px;padding:12px;color:#0D1117;font-size:14px;font-weight:700;cursor:pointer}
button.enter:hover{background:#00bfa0}
.err{color:#F85149;font-size:12px;margin-top:8px;min-height:18px}
/* DASHBOARD */
#dashPage{padding:24px;min-height:100vh}
.topbar{display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #21262D;padding-bottom:16px;margin-bottom:20px}
.logo-sm{width:32px;height:32px;background:#00D4AA;border-radius:8px;display:inline-flex;align-items:center;justify-content:center;font-weight:700;color:#0D1117;margin-left:8px}
.title{font-size:16px;font-weight:600}
.loading{text-align:center;padding:60px;color:#484F58}
</style>
</head>
<body>

<!-- מסך כניסה -->
<div id="loginPage" class="page active">
  <div class="box">
    <div class="logo">מ</div>
    <h1>מפה</h1>
    <div class="sub">מערכת ניהול השכרת מפות ומפיות</div>
    <input type="password" id="passInput" placeholder="סיסמה" onkeydown="if(event.key==='Enter')login()">
    <button class="enter" onclick="login()">כניסה</button>
    <div class="err" id="errMsg"></div>
  </div>
</div>

<!-- דאשבורד -->
<div id="dashPage" class="page">
  <div class="topbar">
    <div>
      <span class="logo-sm">מ</span>
      <span class="title">מפה — לוח בקרה</span>
    </div>
    <span id="dateLabel" style="font-size:12px;color:#8B949E"></span>
  </div>
  <div id="dashContent" class="loading">טוען נתונים...</div>
</div>

<script>
const PASSWORD = "MAPA2026";
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycby8BqlL6Cg7lynZ4CDLPVVUtLz3Km2wD_x-xKawaDBomUDWzgCUQWp7loUK26B3ka9v/exec";

function login() {
  const val = document.getElementById("passInput").value.trim();
  if (!val) { document.getElementById("errMsg").textContent = "הכנס סיסמה"; return; }
  if (val !== PASSWORD) { document.getElementById("errMsg").textContent = "סיסמה שגויה"; document.getElementById("passInput").value = ""; return; }
  document.getElementById("loginPage").classList.remove("active");
  document.getElementById("dashPage").classList.add("active");
  setDate();
  loadData();
}

function setDate() {
  const d = new Date();
  const days = ["ראשון","שני","שלישי","רביעי","חמישי","שישי","שבת"];
  const months = ["ינואר","פברואר","מרץ","אפריל","מאי","יוני","יולי","אוגוסט","ספטמבר","אוקטובר","נובמבר","דצמבר"];
  document.getElementById("dateLabel").textContent = "יום " + days[d.getDay()] + ", " + d.getDate() + " ב" + months[d.getMonth()] + " " + d.getFullYear();
}

function loadData() {
  const cb = "cb" + Math.random().toString(36).slice(2);
  const s = document.createElement("script");
  window[cb] = function(data) {
    delete window[cb];
    if (s.parentNode) document.body.removeChild(s);
    renderDash(data);
  };
  s.onerror = function() {
    delete window[cb];
    document.getElementById("dashContent").innerHTML = '<div style="color:#F85149;text-align:center;padding:40px">שגיאת חיבור לנתונים</div>';
  };
  s.src = SCRIPT_URL + "?callback=" + cb;
  document.body.appendChild(s);
}

function renderDash(d) {
  const fmt = n => Number(n||0).toLocaleString("he-IL");
  const inv = d.inventory || [];
  const totalUnits = inv.reduce((a,r) => a + (Number(r.total)||0), 0);
  const atClient = inv.reduce((a,r) => a + (Number(r.atClient)||0), 0);
  const packed = inv.reduce((a,r) => a + (Number(r.packed)||0), 0);
  const drivers = d.drivers || [];

  document.getElementById("dashContent").innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px">
      ${kpi("יוצאות היום", d.todayShipments||0, "#00D4AA")}
      ${kpi("באיחור", d.lateCount||0, d.lateCount>0?"#F85149":"#00D4AA")}
      ${kpi("בחוץ סה\"כ", d.allOut||0, "#E3B341")}
      ${kpi("נהגים פעילים", (d.driversActive||0)+"/"+(drivers.length), "#79B8FF")}
      ${kpi("יחידות אצל לקוח", fmt(atClient), "#E3B341")}
      ${kpi("זמין למשלוח", fmt(packed), "#00D4AA")}
      ${kpi("חובות פתוחים", "₪"+fmt(d.totalDebt||0), d.totalDebt>0?"#F85149":"#00D4AA")}
      ${kpi("הכנסות החודש", "₪"+fmt(d.monthRevenue||0), "#00D4AA")}
    </div>

    <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px">
      <div style="background:#161B22;border:1px solid #21262D;border-radius:12px;padding:18px">
        <div style="font-size:12px;color:#8B949E;margin-bottom:12px">הזמנות בחוץ</div>
        ${(d.outList||[]).slice(0,8).map(o => `
          <div style="background:#0D1117;border:1px solid #21262D;border-right:3px solid ${Number(o.delay)>0?'#F85149':'#00D4AA'};border-radius:8px;padding:10px 12px;margin-bottom:7px;display:flex;justify-content:space-between;align-items:center">
            <div>
              <div style="font-size:13px;font-weight:500">${o.client||"—"}</div>
              <div style="font-size:11px;color:#8B949E">חזרה: ${o.returnPlan?new Date(o.returnPlan).toLocaleDateString("he-IL"):"—"}</div>
            </div>
            <span style="font-size:10px;padding:3px 8px;border-radius:10px;background:${Number(o.delay)>0?'#2b1116':'#0d2b25'};color:${Number(o.delay)>0?'#F85149':'#00D4AA'}">${Number(o.delay)>0?'⚠ '+o.delay+' ימי עיכוב':'בחוץ'}</span>
          </div>`).join("") || '<div style="color:#484F58;text-align:center;padding:20px">אין הזמנות פעילות</div>'}
      </div>

      <div>
        <div style="background:#161B22;border:1px solid #21262D;border-radius:12px;padding:18px;margin-bottom:12px">
          <div style="font-size:12px;color:#8B949E;margin-bottom:12px">נהגים</div>
          <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
            ${drivers.slice(0,4).map(dr => {
              const active = dr.active===true||dr.active==="כן"||dr.active==="TRUE";
              const initials = (dr.name||"נ נ").split(" ").map(w=>w[0]).join("").slice(0,2);
              return `<div style="background:#0D1117;border:1px solid #21262D;border-radius:8px;padding:10px 6px;text-align:center">
                <div style="width:36px;height:36px;border-radius:50%;background:${active?'#00D4AA':'#21262D'};color:${active?'#0D1117':'#8B949E'};display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:600;margin:0 auto 6px">${initials}</div>
                <div style="font-size:11px">${dr.name||""}</div>
                <div style="font-size:10px;color:${active?'#00D4AA':'#484F58'}">${active?"פעיל":"לא פעיל"}</div>
              </div>`;
            }).join("") || '<div style="color:#484F58">אין נתונים</div>'}
          </div>
        </div>
        <div style="background:#161B22;border:1px solid #21262D;border-radius:12px;padding:18px">
          <div style="font-size:12px;color:#8B949E;margin-bottom:12px">מלאי</div>
          ${inv.map(r => {
            const pct = totalUnits > 0 ? Math.round((Number(r.atClient)||0)/totalUnits*100) : 0;
            return `<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
              <div style="font-size:12px;color:#8B949E;width:90px;flex-shrink:0">${r.name||""}</div>
              <div style="flex:1;height:7px;background:#21262D;border-radius:4px;overflow:hidden">
                <div style="width:${pct}%;height:100%;background:#00D4AA;border-radius:4px"></div>
              </div>
              <div style="font-size:12px;width:30px">${fmt(r.total)}</div>
            </div>`;
          }).join("") || '<div style="color:#484F58">אין נתונים</div>'}
        </div>
      </div>
    </div>`;
}

function kpi(label, val, color) {
  return `<div style="background:#161B22;border:1px solid #21262D;border-radius:12px;padding:16px">
    <div style="font-size:11px;color:#8B949E;margin-bottom:8px">${label}</div>
    <div style="font-size:28px;font-weight:600;color:${color}">${val}</div>
  </div>`;
}
</script>
</body>
</html>
